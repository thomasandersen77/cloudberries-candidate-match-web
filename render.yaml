services:
  - type: web
    name: cloudberries-candidate-match-web
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    envVars:
      - key: VITE_API_BASE_URL
        value: https://cloudberries-candidate-match.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

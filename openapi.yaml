openapi: 3.0.3
info:
  title: Cloudberries Candidate Match API
  version: 1.2.0
  description: |
    API for candidate matching, CV retrieval, embeddings, RAG operations, and administrative utilities.
    Includes cost optimization monitoring and asynchronous matching support.
  contact:
    name: Cloudberries
servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Admin
    description: Administrative and usage monitoring
  - name: Chat
    description: AI content analysis and RAG
  - name: Skills
    description: Company skills overview
  - name: Consultants
    description: Consultant search, retrieval, and sync
  - name: CV
    description: Consultant CV retrieval
  - name: Embeddings
    description: CV embedding operations
  - name: Health
    description: Health checks
  - name: Matches
    description: Candidate matching and project request analysis
  - name: CV Scoring
    description: CV scoring utilities

paths:
  /admin/anthropic-usage:
    get:
      tags: [ Admin ]
      summary: Get Anthropic API usage and cost statistics
      responses:
        '200':
          description: Usage statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnthropicUsageResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /chatbot/analyze:
    post:
      tags: [ Chat ]
      summary: Analyze content with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIAnalysisRequest'
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIResponseModel'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /rag/chat:
    post:
      tags: [ Chat ]
      summary: Chat with AI using RAG (Retrieval-Augmented Generation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagChatRequest'
      responses:
        '200':
          description: Chat response with sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagChatResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /rag/ingest:
    post:
      tags: [ Chat ]
      summary: Ingest a CV into the RAG vector store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagIngestRequest'
      responses:
        '200':
          description: Ingestion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingested:
                    type: integer
        default:
          $ref: '#/components/responses/ErrorResponse'

  /rag/ingest/db:
    post:
      tags: [ Chat ]
      summary: Ingest all CVs from the database into the RAG vector store
      responses:
        '200':
          description: Batch ingestion report
          content:
            application/json:
              schema:
                type: object
                properties:
                  rowsProcessed:
                    type: integer
                  chunksAdded:
                    type: integer
        default:
          $ref: '#/components/responses/ErrorResponse'

  /consultants:
    get:
      tags: [ Consultants ]
      summary: List consultants (paged)
      parameters:
        - in: query
          name: name
          schema:
            type: string
          description: Optional name filter (contains)
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paged consultants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageConsultantSummaryDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /consultants/with-cv:
    get:
      tags: [ Consultants ]
      summary: Get all consultants with their CVs
      parameters:
        - in: query
          name: onlyActiveCv
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of consultants with CVs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConsultantWithCvDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /consultants/with-cv/paged:
    get:
      tags: [ Consultants ]
      summary: Get paged consultants with their CVs
      parameters:
        - in: query
          name: onlyActiveCv
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paged consultants with CVs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseConsultantWithCvDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /consultants/{userId}/cvs:
    get:
      tags: [ Consultants ]
      summary: List CVs for a specific consultant
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
        - in: query
          name: onlyActiveCv
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of consultant CVs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConsultantCvDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /consultants/search:
    post:
      tags: [ Consultants ]
      summary: Relational search for consultants
      operationId: searchConsultantsRelational
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationalSearchRequest'
      responses:
        '200':
          description: Paged consultants matching filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageConsultantWithCvDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /consultants/search/semantic:
    post:
      tags: [ Consultants ]
      summary: Semantic (vector) search for consultants
      operationId: searchConsultantsSemantic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticSearchRequest'
      responses:
        '200':
          description: Paged semantically similar consultants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageConsultantWithCvDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /consultants/search/embedding-info:
    get:
      tags: [ Consultants ]
      summary: Get information about the configured embedding provider
      responses:
        '200':
          description: Embedding provider info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingProviderInfo'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /consultants/sync/run:
    post:
      tags: [ Consultants ]
      summary: Trigger a sync from Flowcase
      parameters:
        - in: query
          name: batchSize
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Sync summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'

  /cv/{userId}:
    get:
      tags: [ CV ]
      summary: Get a consultant's CV (raw JSON)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CV data
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'

  /embeddings/run/missing:
    post:
      tags: [ Embeddings ]
      summary: Generate embeddings for users missing vectors
      parameters:
        - in: query
          name: batchSize
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Operation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  processedCount:
                    type: integer
                  batchSize:
                    type: integer
        default:
          $ref: '#/components/responses/ErrorResponse'

  /matches/requests:
    get:
      tags: [ Matches ]
      summary: List all project requests available for matching
      responses:
        '200':
          description: List of project request summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectRequestSummaryDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /matches/requests-paged:
    get:
      tags: [ Matches ]
      summary: List project requests with coverage information (paged)
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20 }
        - in: query
          name: sort
          schema: { type: string, default: "uploadedAt,desc" }
      responses:
        '200':
          description: Paged project requests with coverage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMatchesListDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /matches/requests/{id}/top-consultants:
    get:
      tags: [ Matches ]
      summary: Returns AI-enriched top consultants for a given project request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: limit
          schema: { type: integer, default: 5 }
      responses:
        '200':
          description: List of AI-enriched matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MatchConsultantDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /matches/requests/{id}/re-analyze:
    post:
      tags: [ Matches ]
      summary: Re-analyzes and re-ranks consultants for a project request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Re-analysis results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MatchConsultantDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /matches/requests/{projectRequestId}/trigger:
    post:
      tags: [ Matches ]
      summary: Trigger matching computation for a specific project request
      parameters:
        - in: path
          name: projectRequestId
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: forceRecompute
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Trigger status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerMatchingResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /matches/status/{requestId}:
    get:
      tags: [ Matches ]
      summary: Get the status of a matching job
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Match status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchStatusDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /matches/recalculate/{requestId}:
    post:
      tags: [ Matches ]
      summary: Recalculate matches for a project request (Async)
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '202':
          description: Recalculation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId: { type: integer }
                  statusUrl: { type: string }
                  matchesUrl: { type: string }
        default:
          $ref: '#/components/responses/ErrorResponse'

  /matches/trigger-all:
    post:
      tags: [ Matches ]
      summary: Trigger matching for all project requests
      parameters:
        - in: query
          name: forceRecompute
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Batch operation status
        default:
          $ref: '#/components/responses/ErrorResponse'

  /project-requests/upload:
    post:
      tags: [ Matches ]
      summary: Upload and analyze a customer project request PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [ file ]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Extracted project request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRequestResponseDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /cv-score/{candidateId}:
    get:
      tags: [ CV Scoring ]
      summary: Get CV score for a candidate
      parameters:
        - in: path
          name: candidateId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Candidate CV score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CvScoreDto'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [ CV Scoring ]
      summary: Trigger scoring for single candidate
      operationId: runScoreForCandidate
      parameters:
        - in: path
          name: candidateId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated candidate CV score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CvScoreDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /cv-score/all:
    get:
      tags: [ CV Scoring ]
      summary: List all candidates (summary)
      responses:
        '200':
          description: Candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CandidateDTO'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /cv-score/run/all:
    post:
      tags: [ CV Scoring ]
      summary: Trigger scoring for all consultants
      responses:
        '200':
          description: Scoring summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CvScoringRunResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /health:
    get:
      tags: [ Health ]
      summary: Health check
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /skills:
    get:
      tags: [ Skills ]
      summary: List skills across consultants
      parameters:
        - in: query
          name: skill
          description: Optional skill filter (repeat to filter by multiple)
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
      responses:
        '200':
          description: Skill aggregates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillInCompanyDto'
        default:
          $ref: '#/components/responses/ErrorResponse'

components:
  parameters:
    PageParam:
      in: query
      name: page
      description: Page number (0-indexed)
      schema: { type: integer, minimum: 0, default: 0 }
    SizeParam:
      in: query
      name: size
      description: Page size
      schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
    SortParam:
      in: query
      name: sort
      description: Sort field(s), e.g. `name,asc`. Repeat for multi-sort.
      schema:
        type: array
        items: { type: string }
      style: form
      explode: true

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    AnthropicUsageResponse:
      type: object
      properties:
        inputTokens: { type: integer, format: int64 }
        outputTokens: { type: integer, format: int64 }
        cacheCreationTokens: { type: integer, format: int64 }
        cacheReadTokens: { type: integer, format: int64 }
        totalInputTokens: { type: integer, format: int64 }
        cacheHitRate: { type: number, format: double }
        estimatedCostUsd: { type: number, format: double }

    AIAnalysisRequest:
      type: object
      required: [ content ]
      properties:
        content: { type: string, description: Content to analyze }

    AIResponseModel:
      type: object
      properties:
        content: { type: string }
        modelUsed: { type: string }

    RagChatRequest:
      type: object
      required: [ message ]
      properties:
        message: { type: string }
        topK: { type: integer, default: 4 }
        similarityThreshold: { type: number, format: double, default: 0.7 }
        filter: { type: string, nullable: true }

    RagChatResponse:
      type: object
      properties:
        answer: { type: string }
        sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceDocument'

    SourceDocument:
      type: object
      properties:
        id: { type: string, nullable: true }
        contentPreview: { type: string }
        metadata:
          type: object
          additionalProperties: true

    RagIngestRequest:
      type: object
      required: [ candidateId, cvText ]
      properties:
        candidateId: { type: integer, format: int64 }
        name: { type: string, nullable: true }
        cvText: { type: string }

    ConsultantSummaryDto:
      type: object
      required: [ userId, name, email, bornYear, defaultCvId ]
      properties:
        userId: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        bornYear: { type: integer }
        defaultCvId: { type: string }

    PageConsultantSummaryDto:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/ConsultantSummaryDto' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        number: { type: integer }
        size: { type: integer }

    ConsultantWithCvDto:
      type: object
      required: [ userId, name, cvId, skills, cvs ]
      properties:
        id: { type: integer, format: int64, nullable: true }
        userId: { type: string }
        name: { type: string }
        cvId: { type: string }
        skills:
          type: array
          items: { type: string }
        cvs:
          type: array
          items: { $ref: '#/components/schemas/ConsultantCvDto' }

    ConsultantCvDto:
      type: object
      required: [ active, industries ]
      properties:
        id: { type: integer, format: int64, nullable: true }
        versionTag: { type: string, nullable: true }
        qualityScore: { type: integer, nullable: true }
        active: { type: boolean }
        industries:
          type: array
          items: { type: string }
        keyQualifications:
          type: array
          items: { $ref: '#/components/schemas/KeyQualificationDto' }
        education:
          type: array
          items: { $ref: '#/components/schemas/EducationDto' }
        workExperience:
          type: array
          items: { $ref: '#/components/schemas/WorkExperienceDto' }
        projectExperience:
          type: array
          items: { $ref: '#/components/schemas/ProjectExperienceDto' }
        certifications:
          type: array
          items: { $ref: '#/components/schemas/CertificationDto' }
        courses:
          type: array
          items: { $ref: '#/components/schemas/CourseDto' }
        languages:
          type: array
          items: { $ref: '#/components/schemas/LanguageDto' }
        skillCategories:
          type: array
          items: { $ref: '#/components/schemas/SkillCategoryDto' }
        attachments:
          type: array
          items: { $ref: '#/components/schemas/AttachmentDto' }

    KeyQualificationDto:
      type: object
      properties:
        label: { type: string, nullable: true }
        description: { type: string, nullable: true }

    EducationDto:
      type: object
      properties:
        degree: { type: string, nullable: true }
        school: { type: string, nullable: true }
        fromYearMonth: { type: string, nullable: true }
        toYearMonth: { type: string, nullable: true }

    WorkExperienceDto:
      type: object
      properties:
        employer: { type: string, nullable: true }
        fromYearMonth: { type: string, nullable: true }
        toYearMonth: { type: string, nullable: true }

    ProjectExperienceDto:
      type: object
      properties:
        customer: { type: string, nullable: true }
        description: { type: string, nullable: true }
        longDescription: { type: string, nullable: true }
        fromYearMonth: { type: string, nullable: true }
        toYearMonth: { type: string, nullable: true }
        roles:
          type: array
          items: { $ref: '#/components/schemas/ProjectRoleDto' }
        skills:
          type: array
          items: { type: string }

    ProjectRoleDto:
      type: object
      properties:
        name: { type: string, nullable: true }
        description: { type: string, nullable: true }

    CertificationDto:
      type: object
      properties:
        name: { type: string, nullable: true }
        year: { type: integer, nullable: true }

    CourseDto:
      type: object
      properties:
        name: { type: string, nullable: true }
        organizer: { type: string, nullable: true }
        year: { type: integer, nullable: true }

    LanguageDto:
      type: object
      properties:
        name: { type: string, nullable: true }
        level: { type: string, nullable: true }

    SkillCategoryDto:
      type: object
      properties:
        name: { type: string, nullable: true }
        skills:
          type: array
          items: { $ref: '#/components/schemas/SkillInCategoryDto' }

    SkillInCategoryDto:
      type: object
      properties:
        name: { type: string, nullable: true }
        durationYears: { type: integer, nullable: true }

    AttachmentDto:
      type: object
      properties:
        fileName: { type: string, nullable: true }
        url: { type: string, nullable: true }

    PageResponseConsultantWithCvDto:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/ConsultantWithCvDto' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        number: { type: integer }
        size: { type: integer }

    PageConsultantWithCvDto:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/ConsultantWithCvDto' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        number: { type: integer }
        size: { type: integer }

    RelationalSearchRequest:
      type: object
      properties:
        name: { type: string, nullable: true }
        skillsAll:
          type: array
          items: { type: string }
        skillsAny:
          type: array
          items: { type: string }
        minQualityScore: { type: integer, nullable: true }
        onlyActiveCv: { type: boolean, default: false }
        pagination: { $ref: '#/components/schemas/PaginationDto' }

    SemanticSearchRequest:
      type: object
      required: [ text ]
      properties:
        text: { type: string }
        provider: { type: string, default: "GOOGLE_GEMINI" }
        model: { type: string, default: "gemini-embedding-001" }
        topK: { type: integer, default: 10 }
        minQualityScore: { type: integer, nullable: true }
        onlyActiveCv: { type: boolean, default: false }
        pagination: { $ref: '#/components/schemas/PaginationDto' }

    PaginationDto:
      type: object
      properties:
        page: { type: integer, default: 0 }
        size: { type: integer, default: 10 }
        sort:
          type: array
          items: { type: string }

    EmbeddingProviderInfo:
      type: object
      properties:
        providerName: { type: string }
        modelName: { type: string }
        dimension: { type: integer }
        enabled: { type: boolean }

    ProjectRequestSummaryDto:
      type: object
      required: [ id, customerName, createdAt ]
      properties:
        id: { type: integer, format: int64 }
        title: { type: string, nullable: true }
        customerName: { type: string }
        createdAt: { type: string, format: date-time }

    PagedMatchesListDto:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/MatchesListItemDto' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        currentPage: { type: integer }
        pageSize: { type: integer }
        hasNext: { type: boolean }
        hasPrevious: { type: boolean }

    MatchesListItemDto:
      type: object
      required: [ id, hitCount, coverageStatus, coverageLabel ]
      properties:
        id: { type: integer, format: int64 }
        title: { type: string, nullable: true }
        customerName: { type: string, nullable: true }
        date: { type: string, format: date-time, nullable: true }
        deadlineDate: { type: string, format: date-time, nullable: true }
        hitCount: { type: integer, format: int64 }
        coverageStatus: { $ref: '#/components/schemas/CoverageStatus' }
        coverageLabel: { type: string }

    CoverageStatus:
      type: string
      enum: [ GREEN, YELLOW, RED, NEUTRAL ]

    MatchConsultantDto:
      type: object
      required: [ userId, name, cvId, relevanceScore ]
      properties:
        userId: { type: string }
        name: { type: string }
        cvId: { type: string }
        relevanceScore: { type: number, format: double }
        justification: { type: string, nullable: true }

    TriggerMatchingResponse:
      type: object
      required: [ projectRequestId, status, message ]
      properties:
        projectRequestId: { type: integer, format: int64 }
        status: { type: string }
        message: { type: string }
        jobId: { type: string, nullable: true }

    MatchStatusDto:
      type: object
      required: [ status ]
      properties:
        status: { type: string, description: "PENDING|RUNNING|COMPLETED|FAILED" }
        lastUpdated: { type: string, format: date-time, nullable: true }
        error: { type: string, nullable: true }

    ProjectRequestResponseDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        customerName: { type: string }
        title: { type: string }
        summary: { type: string }
        originalFilename: { type: string }
        mustRequirements:
          type: array
          items: { $ref: '#/components/schemas/ProjectRequirementDto' }
        shouldRequirements:
          type: array
          items: { $ref: '#/components/schemas/ProjectRequirementDto' }

    ProjectRequirementDto:
      type: object
      required: [ name ]
      properties:
        name: { type: string }
        details: { type: string }

    CvScoreDto:
      type: object
      required: [ candidateId, scorePercent, summary, strengths, potentialImprovements ]
      properties:
        candidateId: { type: string }
        scorePercent: { type: integer }
        summary: { type: string }
        strengths:
          type: array
          items: { type: string }
        potentialImprovements:
          type: array
          items: { type: string }

    CandidateDTO:
      type: object
      required: [ id, name, birthYear ]
      properties:
        id: { type: string }
        name: { type: string }
        birthYear: { type: integer }

    CvScoringRunResponse:
      type: object
      required: [ processedCount ]
      properties:
        processedCount: { type: integer }

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ UP, DOWN, OUT_OF_SERVICE, UNKNOWN ]
        details:
          type: object
          additionalProperties: { type: string }

    SkillInCompanyDto:
      type: object
      required: [ name, konsulenterMedSkill, konsulenter ]
      properties:
        name: { type: string }
        konsulenterMedSkill: { type: integer }
        konsulenter:
          type: array
          items: { $ref: '#/components/schemas/ConsultantSummaryDto' }

    Problem:
      type: object
      properties:
        status: { type: integer }
        error: { type: string }
        message: { type: string }
        path: { type: string }
